# Electron Builder Configuration
# https://www.electron.build/configuration/configuration

# Application identifiers
appId: com.worktracker.desktop
productName: WorkTracker
copyright: Copyright © 2024 WorkTracker

# Build directories
directories:
  output: electron-dist
  buildResources: assets

# Override package.json main for Electron (Expo uses its own entry point)
extraMetadata:
  main: electron/main.js

# Files to include in the build
files:
  - dist/**/*
  - electron/**/*.js
  - package.json

# Files to exclude from the build
extraResources: []

# ASAR archive configuration
asar: true
asarUnpack:
  - "**/*.node"

# macOS configuration
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  icon: assets/icon.icns
  darkModeSupport: true

# DMG configuration for macOS
dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows configuration
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: assets/icon.ico

# NSIS installer configuration for Windows
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: WorkTracker

# Linux configuration
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Office
  icon: assets/icon.png
  maintainer: WorkTracker
  synopsis: Work time tracking application
  description: A cross-platform work tracking application for managing time entries and productivity goals.

# Publish configuration (disabled by default)
publish: null

# Build hooks
afterSign: null
afterPack: null

# Compression
compression: normal

# Remove package scripts for security
removePackageScripts: true
