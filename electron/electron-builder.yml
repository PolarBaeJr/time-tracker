# Electron Builder Configuration
# https://www.electron.build/configuration/configuration

# Application identifiers
appId: com.worktracker.desktop
productName: WorkTracker
copyright: Copyright © 2024 WorkTracker

# Build directories
directories:
  output: electron-dist
  buildResources: assets

# Use locally installed castLabs Electron (with Widevine CDM)
electronDist: node_modules/electron/dist

# Override package.json main for Electron (Expo uses its own entry point)
extraMetadata:
  main: electron/main.js

# Files to include in the build
# The web app is fully bundled in dist/. Only electron-updater is needed at runtime.
files:
  - "!**/*"
  - dist/**/*
  - electron/**/*.js
  - electron/**/*.html
  - package.json
  - node_modules/electron-updater/**
  - node_modules/builder-util-runtime/**
  - node_modules/fs-extra/**
  - node_modules/graceful-fs/**
  - node_modules/jsonfile/**
  - node_modules/universalify/**
  - node_modules/js-yaml/**
  - node_modules/argparse/**
  - node_modules/lazy-val/**
  - node_modules/lodash.escaperegexp/**
  - node_modules/lodash.isequal/**
  - node_modules/semver/**
  - node_modules/tiny-typed-emitter/**
  - node_modules/sax/**
  - node_modules/debug/**
  - node_modules/ms/**

# Files to exclude from the build
extraResources: []

# ASAR archive configuration
asar: true
asarUnpack:
  - "**/*.node"

# macOS configuration
mac:
  identity: null
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  icon: assets/icon.icns
  darkModeSupport: true

# DMG configuration for macOS
dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows configuration
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: assets/icon.ico

# NSIS installer configuration for Windows
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: WorkTracker

# Linux configuration
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Office
  icon: assets/icon.png
  maintainer: WorkTracker
  synopsis: Work time tracking application
  description: A cross-platform work tracking application for managing time entries and productivity goals.

# Publish configuration — GitHub Releases for auto-updates
publish:
  provider: github
  owner: PolarBaeJr
  repo: time-tracker
  releaseType: release

# Build hooks — signing done manually after build (codesign then VMP)
afterPack: null
afterSign: null

# Compression
compression: normal

# Remove package scripts for security
removePackageScripts: true
