# HTTPS server template. This file is not included by default because local and
# container builds do not ship certificates. Update server_name and certificate
# paths, then include it from nginx.conf once TLS is provisioned.
server {
  listen 443 ssl http2;
  server_name example.com;

  root /usr/share/nginx/html;
  index index.html;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    add_header Cache-Control "no-store" always;
    include /etc/nginx/security-headers.conf;
    return 200 'OK';
  }

  location = /index.html {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    include /etc/nginx/security-headers.conf;
  }

  location = /metadata.json {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache, must-revalidate" always;
    include /etc/nginx/security-headers.conf;
  }

  location ~* ^/_expo/static/.*\.(?:css|gif|ico|jpg|jpeg|js|json|mjs|png|svg|ttf|webp|woff|woff2)$ {
    try_files $uri =404;
    expires 1y;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    include /etc/nginx/security-headers.conf;
  }

  location / {
    include /etc/nginx/security-headers.conf;
    try_files $uri $uri/ /index.html;
  }
}
