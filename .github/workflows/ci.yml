name: CI

on:
  push:
    branches: [main, "conduct/**"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: worktracker

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: worktracker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --coverage --passWithNoTests

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: worktracker/coverage/

  integration-tests:
    name: Integration Tests (Supabase RLS)
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: worktracker/package-lock.json

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Install dependencies
        run: npm ci

      - name: Start local Supabase
        run: supabase start
        working-directory: worktracker

      - name: Run RLS SQL tests
        run: ./scripts/test-integration.sh --skip-start
        working-directory: worktracker

      - name: Run TypeScript integration tests
        run: npm run test -- --testPathPattern=integration --passWithNoTests
        env:
          INTEGRATION_TESTS: "true"
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7ACciz0OlO4eTbK9FjkuWVZ2q0k9x6rJk88
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0

      - name: Stop Supabase
        if: always()
        run: supabase stop
        working-directory: worktracker
