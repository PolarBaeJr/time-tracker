# HTTPS replacement template. Promote this file into nginx/nginx.conf only after
# certificates are available and the container/host can read /etc/nginx/certs.
server {
  listen 80;
  server_name example.com;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    add_header Cache-Control "no-store" always;
    include /etc/nginx/security-headers.conf;
    return 200 'OK';
  }

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name example.com;

  root /usr/share/nginx/html;
  index index.html;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_dhparam /etc/nginx/certs/dhparam.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
  ssl_ecdh_curve X25519:secp256r1:secp384r1;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    add_header Cache-Control "no-store" always;
    include /etc/nginx/security-headers.conf;
    return 200 'OK';
  }

  location = /index.html {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    include /etc/nginx/security-headers.conf;
  }

  location = /metadata.json {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache, must-revalidate" always;
    include /etc/nginx/security-headers.conf;
  }

  location ~* ^/_expo/static/.*\.(?:css|gif|ico|jpg|jpeg|js|json|mjs|png|svg|ttf|webp|woff|woff2)$ {
    try_files $uri =404;
    expires 1y;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    include /etc/nginx/security-headers.conf;
  }

  location / {
    include /etc/nginx/security-headers.conf;
    try_files $uri $uri/ /index.html;
  }
}
