name: worktracker

services:
  web:
    image: ${WORKTRACKER_IMAGE:-worktracker-web:latest}
    platform: ${WORKTRACKER_DOCKER_PLATFORM:-linux/arm64}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        SUPABASE_URL: ${SUPABASE_URL:-}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
        GOOGLE_IOS_REVERSED_CLIENT_ID: ${GOOGLE_IOS_REVERSED_CLIENT_ID:-}
        EAS_PROJECT_ID: ${EAS_PROJECT_ID:-}
    ports:
      - '${WORKTRACKER_HTTP_PORT:-80}:80'
    restart: unless-stopped
    volumes:
      - nginx_logs:/var/log/nginx
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: '${DOCKER_LOG_MAX_FILES:-3}'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:80/health >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  nginx_logs:
